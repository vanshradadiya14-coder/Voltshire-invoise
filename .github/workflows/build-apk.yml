name: Build Android APK

# Builds a release APK in the cloud on every push, and lets you trigger a
# build manually from the Actions tab. No local Flutter install needed.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java (needed by the Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate the Android project files
        run: flutter create --platforms=android .

      - name: Set Android SDK versions (Firebase minSdk 23; force compileSdk 36 everywhere)
        run: |
          app=android/app/build.gradle.kts
          if [ -f "$app" ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' "$app"
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$app"
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/' "$app"
          fi
          # Force EVERY Android module (app + all plugins) to compile against
          # SDK 36. Some plugins hardcode an older compileSdk, so an app-level
          # bump alone is not enough.
          proj=android/build.gradle.kts
          if [ -f "$proj" ]; then
            {
              echo ""
              echo "subprojects {"
              echo "    if (!state.executed) {"
              echo "        afterEvaluate {"
              echo "            val androidExtension = project.extensions.findByName(\"android\")"
              echo "            if (androidExtension is com.android.build.gradle.BaseExtension) {"
              echo "                androidExtension.compileSdkVersion(36)"
              echo "            }"
              echo "        }"
              echo "    }"
              echo "}"
            } >> "$proj"
          fi
          echo "----- app build.gradle.kts Sdk lines -----"
          grep -E 'Sdk' "$app" || true
          echo "----- project build.gradle.kts tail -----"
          tail -12 "$proj" || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build the release APK
        run: flutter build apk --release

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: builder-crm-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
